server {
    listen 80;
    server_name _;
    root /app/public;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        # Prevent URIs that include the front controller from being processed twice.
        internal;
    }

    # Return 404 for any other .php file (matches Symfony's recommended config).
    location ~ \.php$ {
        return 404;
    }

    client_max_body_size 16m;
    error_log /var/log/nginx/watcha_error.log;
    access_log /var/log/nginx/watcha_access.log;
}
