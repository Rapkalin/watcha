# Local development stack for Watcha. Not used in production (1&1 shared hosting runs PHP directly).
services:
    database:
        image: mysql:8.0
        environment:
            MYSQL_DATABASE: ${MYSQL_DATABASE:-watcha}
            MYSQL_USER: ${MYSQL_USER:-app}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app}
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
        ports:
            - "3306:3306"
        volumes:
            - database_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
            interval: 5s
            timeout: 5s
            retries: 20

    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
            args:
                UID: ${UID:-1000}
        depends_on:
            database:
                condition: service_healthy
        environment:
            APP_ENV: ${APP_ENV:-dev}
            # MAILER_DSN: "smtp://mailer:1025" # Used to test with mailpit
        volumes:
            - .:/app:cached

    nginx:
        image: nginx:1.27-alpine
        depends_on:
            - php
        ports:
            # Override the host port if it is already in use: HTTP_PORT=8090 docker compose up
            - "${HTTP_PORT:-8085}:80"
        volumes:
            - .:/app:cached
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    # Catches outbound e-mails during development (UI on http://localhost:8025).
    mailer:
        image: axllent/mailpit
        ports:
            - "8025:8025"
            - "1025:1025"
        environment:
            MP_SMTP_AUTH_ACCEPT_ANY: 1
            MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
    database_data:
