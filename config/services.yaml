# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html
parameters:
    app.http_user_agent: '%env(APP_HTTP_USER_AGENT)%'
    app.wpscan_api_token: '%env(WPSCAN_API_TOKEN)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $httpUserAgent: '%app.http_user_agent%'
            string $wpscanApiToken: '%app.wpscan_api_token%'

    App\:
        resource: '../src/'

    # All advisory providers are collected (tagged) and injected into the synchronizer.
    _instanceof:
        App\Service\Cve\AdvisoryProviderInterface:
            tags: ['app.advisory_provider']
        App\Service\Detection\TechnologyDetectorInterface:
            tags: ['app.technology_detector']

    App\Service\Cve\AdvisorySynchronizer:
        arguments:
            $providers: !tagged_iterator app.advisory_provider

    App\Service\Detection\SiteScanner:
        arguments:
            $detectors: !tagged_iterator app.technology_detector
