# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html
parameters:
    app.http_user_agent: '%env(APP_HTTP_USER_AGENT)%'
    app.wpscan_api_token: '%env(WPSCAN_API_TOKEN)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $httpUserAgent: '%app.http_user_agent%'
            string $wpscanApiToken: '%app.wpscan_api_token%'

    App\:
        resource: '../src/'

    # HTTP client dedicated to fetching user-supplied site URLs (the page-availability checker). It
    # wraps the default client and refuses to connect to private, loopback and link-local addresses
    # — re-checked on every redirect — to prevent SSRF (e.g. http://169.254.169.254/, internal
    # hosts), since any approved user can register an arbitrary URL that is then fetched server-side.
    # The advisory providers (OSV, WPScan, Packagist) keep the default client: only fixed hosts.
    app.scanner_http_client:
        class: Symfony\Component\HttpClient\NoPrivateNetworkHttpClient
        arguments:
            $client: '@http_client'

    # All advisory providers are collected (tagged) and injected into the synchronizer.
    _instanceof:
        App\Service\Cve\AdvisoryProviderInterface:
            tags: ['app.advisory_provider']

    App\Service\Cve\AdvisorySynchronizer:
        arguments:
            $providers: !tagged_iterator app.advisory_provider

    App\Service\Page\SitemapScanner:
        arguments:
            $httpClient: '@app.scanner_http_client'
